name: 'DESPLIEGUE FINAL KUIK'

on:
  push:
    branches:
      - "master"

env:
  PROJECT_ID: kuik-dev-002
  GAR_LOCATION: europe-west1
  GKE_CLUSTER: gke-kuik-dev-002
  GKE_ZONE: europe-west1-b 
  REPOSITORY: kuik-repo
  IMAGE: web-app

jobs:
  setup-build-publish-deploy:
    name: 'Setup, Build, Publish, and Deploy'
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: 'Checkout'
      uses: 'actions/checkout@v4'

    # --- AQUÍ ESTABA EL ERROR ---
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2' # <--- ANTES TENÍAS 'get-gke-credentials' AQUÍ
      with:
        token_format: 'access_token'
        workload_identity_provider: 'projects/1071212656279/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
        service_account: 'sa-web-app@kuik-dev-002.iam.gserviceaccount.com'

    - name: 'Docker Auth'
      uses: 'docker/login-action@v3'
      with:
        username: 'oauth2accesstoken'
        password: '${{ steps.auth.outputs.access_token }}'
        registry: '${{ env.GAR_LOCATION }}-docker.pkg.dev'

    - name: 'Build and Push Container'
      run: |-
        docker build -t "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}" .
        docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}"

    - name: 'Set up GKE credentials'
      uses: 'google-github-actions/get-gke-credentials@v2'
      with:
        cluster_name: '${{ env.GKE_CLUSTER }}'
        location: '${{ env.GKE_ZONE }}'
        project_id: '${{ env.PROJECT_ID }}'

    - name: 'Deploy to GKE'
      run: |-
        kubectl set image deployment/web-app web=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}
        kubectl rollout status deployment/web-app
        kubectl get services -o wide